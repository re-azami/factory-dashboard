services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factory
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/migrations/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 5s
      timeout: 3s
      retries: 10

  embeddings:
    build: ./embeddings
    environment:
      MODEL_NAME: BAAI/bge-m3
      HF_HOME: /models
    ports:
      - "8001:8000"
    volumes:
      - embeddings_models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://factory:factory@db:5432/factory
      DATABASE_URL_RO: postgresql+psycopg://factory_ro:factory_ro@db:5432/factory
      EMBEDDINGS_URL: http://embeddings:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      embeddings:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./data:/data

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  db_data:
  embeddings_models:
