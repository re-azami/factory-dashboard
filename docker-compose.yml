services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped

  embeddings:
    build: ./embeddings
    volumes:
      - ./data/models:/models
    environment:
      MODEL_NAME: BAAI/bge-m3
      MODEL_DIR: /models
      HF_ENDPOINT: https://huggingface.co/
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      retries: 10
      start_period: 60s  # first run downloads the model
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://factory:factory@db:5432/factory
      DATABASE_URL_RO: postgresql+psycopg://factory_ro:factory_ro@db:5432/factory
      EMBEDDINGS_URL: http://embeddings:8001
    volumes:
      # Read-only on purpose — the ingester reads files but must never modify or delete them.
      - ./data/raw:/data/raw:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

  # Angular SPA — runs alongside the Streamlit frontend during the migration.
  # Streamlit is on 8501, this is on 4200. Both hit the same backend; CORS
  # whitelists both via FRONTEND_ORIGIN.
  frontend-spa:
    build: ./frontend-spa
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
