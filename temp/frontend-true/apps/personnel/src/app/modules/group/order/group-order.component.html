<div class="groups" cdkDropList (cdkDropListDropped)="drop($event)">
    @for (group of groups; track $index) {
    <div class="group group-drag-box page-border" cdkDrag cdkDragLockAxis="y" cdkDragBoundary=".groups">
        {{ group.title }}
    </div>
    }
</div>

<button mat-raised-button type="button" color="primary" (click)="order()">ذخیره تغییرات</button>
