<content>
    پس از ثبت پایان دوره، اطلاعات دوره به صورت آرشیو شده در سیستم ثبت شده و امکان تغییر اطلاعات پس از آن وجود ندارد. برای
    جلوگیری از ایجاد اشکال در اطلاعات سیستم، لطفا قبل از تایید پایان دوره، اطلاعات مربوط به <strong>شرکت‌کننده‌ها</strong>،
    <strong>هزینه‌ها</strong> و <strong>نتایج شرکت در دوره</strong> را بررسی کنید.
</content>

<ngx-form [ngxForm]="ngxForm" (ngxSubmit)="ngxSubmit($event)"></ngx-form>
