@if (sizes.length !== 0) {
<div class="data">
    @for (size of sizes; track $index) {
    <div class="item size">{{ size | number }}</div>
    }
</div>

<div class="data">
    @for (value of values; track $index) {
    <div class="item">{{ value | number }}</div>
    }
</div>
}

<page-block [blocks]="blocks[0]" [column]="1"></page-block>
