@if (loading) {
<ngx-helper-loader></ngx-helper-loader>
} @else {
<!-- NO CAGO -->
@if (!cargo) {
<div class="page-comment">اطلاعات بار مرتبط با حواله حذف شده است.</div>
}

<!-- CARGO -->
@else {
<!-- NO TRANSPORTER -->
@if (!cargo.transporter) {
<div class="page-comment">با توجه به تنظیمات بار مرتبط با حواله، امکان ثبت باربری برای این حواله وجود ندارد.</div>
}

<!-- CARGO TRUCK -->
@else {
<ngx-form [ngxForm]="ngxForm" (ngxSubmit)="ngxSubmit($event)"></ngx-form>
} } }
