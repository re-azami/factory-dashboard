server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Belt-and-suspenders: serve .webmanifest with the spec Content-Type
    # `application/manifest+json` so the browser treats the file as a Web
    # App Manifest regardless of the base image's /etc/nginx/mime.types
    # version. This is set in a dedicated location so the rest of the
    # server keeps inheriting the default mime types from http-level
    # (where /etc/nginx/mime.types is included by the nginx:alpine image).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Proxy API calls to the FastAPI backend. Buffering is OFF so the
    # NDJSON stream from POST /chat reaches the SPA chunk-by-chunk.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA routing: try the requested URI, then fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache static assets (filenames contain content hashes in prod build)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
